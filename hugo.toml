baseURL = "https://imsdahl.de/"
title = "Lars Imsdahl"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableEmoji = false

[languages]
  [languages.en]
    languageName = "EN"
    weight = 1
    title = "Lars Imsdahl — AI Consulting"
    [languages.en.params]
      description = "AI consulting for German Mittelstand. We identify the most profitable AI levers in your business — with concrete ROI."
      subtitle = "AI Consulting"

  [languages.de]
    languageName = "DE"
    weight = 2
    title = "Lars Imsdahl — KI-Beratung"
    [languages.de.params]
      description = "KI-Beratung für den Mittelstand. Wir identifizieren die profitabelsten KI-Hebel in Ihrem Unternehmen — mit konkretem ROI."
      subtitle = "KI-Beratung"

[params]
  author = "Lars Imsdahl"
  email = "lars@imsdahl.de"
  tagline = "KI, die sich rechnet."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML"]
  page = ["HTML"]
